version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: docapproval-db
    restart: always
    environment:
      POSTGRES_DB: docapproval
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docapproval"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docapproval-app
    restart: always
    ports:
      - "5173:5173"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/docapproval
      NODE_ENV: production
      PORT: 5173
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
